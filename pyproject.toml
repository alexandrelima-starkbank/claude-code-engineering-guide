# pyproject.toml — configuração de ferramentas Python
# Ajuste conforme o layout e convenções do seu projeto.

[tool.pytest.ini_options]
testpaths = ["tests"]
# Convenção de nomenclatura: <Domínio>Test.py com métodos test<Cenário>
python_files = ["*Test.py"]
python_classes = ["*Test"]
python_functions = ["test*"]

[tool.ruff]
# Aplique a partir da raiz do projeto

[tool.ruff.lint]
# E = pycodestyle errors
# F = pyflakes (imports não usados, variáveis indefinidas)
# W = pycodestyle warnings
# I = isort (ordenação de imports)
# Regras de nomenclatura (N) deliberadamente excluídas — esta codebase usa camelCase
select = ["E", "F", "W", "I"]
ignore = [
    "E501",  # line too long — flexível nesta codebase
    "E741",  # ambiguous variable names — pode conflitar com camelCase
]

[tool.ruff.lint.isort]
# Três grupos: stdlib, external, local — separados por linha em branco
force-sort-within-sections = false
# OBRIGATÓRIO: preencha com os nomes dos pacotes locais do projeto.
# Sem isso o isort não distingue imports locais de third-party e a separação em 3 grupos NÃO funciona.
# Exemplo: known-first-party = ["myapp", "myapp_utils"]
known-first-party = []  # <- AJUSTE ANTES DE USAR
