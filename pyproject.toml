# pyproject.toml — configuração de ferramentas Python
# Ajuste conforme o layout e convenções do seu projeto.

[tool.pytest.ini_options]
testpaths = ["tests"]
# Convenção de nomenclatura: <Domínio>Test.py com métodos test<Cenário>
python_files = ["*Test.py"]
python_classes = ["*Test"]
python_functions = ["test*"]
addopts = "--json-report --json-report-file=.pytest-report.json -q"

[tool.ruff]
# Aplique a partir da raiz do projeto

[tool.ruff.lint]
# E = pycodestyle errors
# F = pyflakes (imports não usados, variáveis indefinidas)
# W = pycodestyle warnings
# I (isort) deliberadamente excluído — a convenção ordena imports por comprimento crescente,
# o que o isort do ruff não suporta. A ordenação é feita pelo sort-imports.py no editor.
# Regras de nomenclatura (N) deliberadamente excluídas — esta codebase usa camelCase
select = ["E", "F", "W"]
ignore = [
    "E501",  # line too long — flexível nesta codebase
    "E741",  # ambiguous variable names — pode conflitar com camelCase
]
