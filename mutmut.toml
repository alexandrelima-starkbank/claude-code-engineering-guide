# mutmut.toml — configuração de mutation testing
#
# IMPORTANTE: paths_to_mutate e tests_dir são placeholders.
# Ajuste para o layout do seu projeto antes de rodar `mutmut run`.
# Os diretórios abaixo não existem neste repositório template.
#
# Documentação: https://mutmut.readthedocs.io

[mutmut]
paths_to_mutate = "src/"
tests_dir = "tests/"
runner = "python -m pytest -x --timeout=60 -q"

# Descomente para excluir arquivos específicos:
# exclude = ["src/migrations/", "src/scripts/"]
